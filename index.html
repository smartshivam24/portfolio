<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Om Prakash Portfolio</title>
  <link rel="icon" href="wep.png.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;

        const currentPath = window.location.pathname.split("/").pop() || "index.html";
        const footerLinks = document.querySelectorAll('.link-btn');

        footerLinks.forEach(link => {
          const linkHref = link.getAttribute('href');

          if (linkHref === currentPath) {
            link.classList.add('active');
            // Certificates page ke liye blue glow aur Home ke liye yellow
            if (currentPath === "Certificate.html") {
              link.style.boxShadow = "0 0 15px #00ccff";
              link.style.backgroundColor = "#00ccff";
              link.style.borderColor = "#00ccff";
            }
          } else {
            link.classList.remove('active');
          }
        });
      });
  });
</script>
